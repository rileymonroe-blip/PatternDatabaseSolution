<html>

         <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Gabriela&display=swap" rel="stylesheet">
        <!-- where you put CSS style sheets-->
        <style>.btn { padding: 10px 14px; border-radius: 6px; background:#f3e8eeff ; color: #fff; text-decoration: none; border: 0;-webkit-text-fill-color:#bacdb0ff ; }
    .field { margin: 10px 0;border-radius: 4px;border-color: black;border-width: medium;}
    input, textarea { width: 100%; padding: 8px; }
    .box { background-color:#bacdb0ff; max-width: 70%; margin: 30px auto; font-family: Arial;padding: 15px; }
    body{background-image: url("static/background.png");}
    label{font-family: Gabriela;}
    .home{
    position: fixed;
    bottom: 5px;
    left: 5px;
    z-index: 1000;  }
    .image{
        max-width:100%;
    }
    </style>
        <script></script>
    </head>
    <body>
        
    <div class="box">
        <h1 style="font-family: Gabriela">Please Enter in your password to proceed</h1>

        {% with messages = get_flashed_messages() %}<!--Displays an error message if password is incorrect-->
            {% if messages %}
            <div class="error" style="margin: 5px;background-color: pink;font-family:Gabriela ;">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="password" name="password" placeholder="Password" style="font-family: Gabriela" required>
            <button class="btn" type="submit" style="margin-bottom: 10px; margin-top: 5px;">Continue</button><!--runs password check on app.py-->
        </form>

        <a class="btn" style="top: 5px; right:100px;" href="{{ url_for('landing') }}">Back</a><!--button to take the user back to landing-->
        
    
  </div> 
  
    </body>
</html>
