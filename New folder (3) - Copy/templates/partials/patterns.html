
        {% if patterns and patterns|length > 0 %}
        {% for p in patterns %}
        <div class="pattern-card" >        
            <div class="details-grid"> <!--Grid layout-->
                <div class="coldetils">
                    <p style="font-size: x-large;"><strong> {{ p[1] }}</strong></p>
                    <p><strong>Location:</strong> {{ p[2] }}</p>
                    <p><strong>Materials:</strong> {{ p[5] }}</p>
                </div>
                <div class="coldetils">
                    <p><strong>Difficulty:</strong> {{ p[3] }}</p>
                    <p><strong>Time:</strong> {{ p[4] }} min</p>
                    {% if p[6] %}
                        <a href="{{ p[6] }}" target="_blank" rel="noopener" class="btn">Access PDF/link</a>
                    {% endif %} 
                </div>
            </div>           
            <div class="card-right">
                {% if p[7] %}
                <div class="patternimage">
                    <img src="{{ p[7] }}" alt="Image not avaibable" >
                </div>
                {% endif %}
            </div>     
            </div>
        {% endfor %} 
        {% else %}
            <p>No patterns found</p>
        {% endif %}       

                    
                
                
    </div>
