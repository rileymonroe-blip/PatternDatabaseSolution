<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> add page</title>
        <meta charset="UTF-8">
        <meta name="description" content=" page to add patterns to database">
        <meta name="Riley Monroe" content="patterns">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <!--link rel="icon" href="fav icon img"-->
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
         <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Gabriela&display=swap" rel="stylesheet">
        <!-- where you put CSS style sheets-->
        <style>.btn { padding: 10px 14px; border-radius: 6px; background:#f3e8eeff ; color: #fff; text-decoration: none; border: 0;-webkit-text-fill-color:#bacdb0ff ; }
    .field { margin: 10px 0;border-radius: 4px;border-color: black;border-width: medium;}
    input, textarea { width: 100%; padding: 8px; }
    .box { background-color:#bacdb0ff; max-width: 70%; margin: 30px auto; font-family: Arial;padding: 15px; }
    body{background-image: url("static/background.png");}
    label{font-family: Gabriela;}
    .home{
    position: fixed;
    bottom: 5px;
    left: 5px;
    z-index: 1000;  }
    .image{
        max-width:100%;
    }
    </style>
        <script></script>


    </head>
    <body>
        
    <div class="box">
    
        
    <h1 style="font-family:Gabriela ;">Add a pattern</h1>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul>
          {% for m in messages %}
            <div class="error" style="margin: 5px;background-color: pink;font-family:Gabriela ;">{{ m }}</div><!--Error message for each pattern-->
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="field">
        <label>Design</label>
        <input name="design" required>
      </div>

      <div class="field">
        <label>Location</label>
        <input name="location">
      </div>

      <div class="field">
        <label>Difficulty</label>
        <input name="difficulty" 
        type="number"
        min="1"
        max="5"
        step="1"
        inputmode="numeric"
        placeholder="e.g.1-5">
      </div>

      <div class="field">
        <label>Time (minutes)</label>
        <input name="time" 
        type="number" 
        min="0"
        step="1"
        inputmode="numeric"
        placeholder="e.g. 60">
      </div>

      <div class="field">
        <label>Materials</label>
        <textarea name="materials" rows="3" placeholder="e.g. zipper, elastic, thread"></textarea>
      </div>

      <div class="field">
        <label>PDF path / link</label>
        <input name="pdf_path">
      </div>

      <div class="field">
        <label>Image URL</label>
        <input name="image_url">
      </div>

      <button class="btn" type="submit">Add pattern</button>
      <a class="btn" href="/" style="background:#866546ff;-webkit-text-fill-color: #f3e8eeff;">Cancel</a>
    </form>
  </div> 
  <div class="home">
  <a class="btn" href="{{ url_for('collection') }}" style="background:#bacdb0ff;
  padding:40px;-webkit-text-fill-color: #f3e8eeff;">Home</a>
  </div> 
    </body>
</html>
