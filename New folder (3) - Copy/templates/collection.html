<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> Pattern database</title>
        <meta charset="UTF-8">
        <meta name="description" content=" pattern database ">
        <meta name="Riley Monroe" content="patterns">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <!--link rel="icon" href="fav icon img"-->
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
        <!-- where you put CSS style sheets-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Cookie&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Gabriela&display=swap" rel="stylesheet">

        <style>
            body{
                background-color:#866546ff;
            }
        </style>
        <script>
        /**All of script was orningally generated by chatGPT */    
        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById('filters');
            const results = document.querySelector('.patterns');
        
            function applyFilters() {
            
                const qs = new URLSearchParams(new FormData(form)).toString();
                fetch('{{ url_for("collection") }}?' + qs, {
                
                    headers: {
                    'X-Requested-With': 'XMLHttpRequest'}
                })
                .then(response => response.text())
                .then(html => { results.innerHTML = html;})
                .catch(console.error);
            }
        
        let t;
        const debouncedApply = () => { clearTimeout(t); t = setTimeout(applyFilters, 250); };
        // Live update on any input change
        form.addEventListener("input", debouncedApply);
    // In case user presses Enter
        form.addEventListener("submit", e => { e.preventDefault(); applyFilters(); });
         document.getElementById("clearFilters").addEventListener("click", () => {
            form.reset();
            applyFilters();
        });
    });
    
        </script>    
    </head>
    <body>
    <header>

    </header>
    <div class="content container-fluid mt-5">
        <form id="filters" method="GET">
            
            <div class="filters-grid"><!--Basic fitter structure generated by chatGPT it has been modified by me since:OpenAi, ChatGPT-5, Dec 26 2025 1:22PM, prompt: screenshot of a google drawing, I now whant the layout of the fillters to look like this, link: https://chatgpt.com/s/t_69ac27a4167c81918fe85f72a8cb1ea6 -->
                <div class="col">
                    <input type="search" name="q" class="form-control"placeholder="Keyword title/materials/location">
                    <input type="text" name="design" class="form-control"placeholder="Design e.g. dress, top">
                    <input type="text" name="location" class="form-control"placeholder="Location e.g. PDF, book">
                </div>

                <div class="col">
                    <input type="text" name="have" class="form-control"placeholder="Materials (e.g. zipper, fabric)">
                    <input type="number" name="difficulty" class="form-control"placeholder="Difficulty 1 to 5" min="1" max="5">
                    <input type="number" name="time" class="form-control"placeholder="Max time in minutes" min="0">
                </div>
            
                <div class="buttons">
                    
                    <button type="button" id="clearFilters" class="btn btn-outline-secondary">Clear</button>
                </div>
            </div>
        </form>
    
        <div class="patterns mt-4">
            {% if ranked is defined and ranked %}
                {% include "partials/patternsranked.html" %}
            {% else %}
                {% include "partials/patterns.html" %}
            {% endif %}
        </div>
    </div>
    {% if session.get("teacher")==True %}
        <div class="add">
        <a href="{{ url_for('new') }}" class="btn" style="padding-top: 7px;
        padding-bottom: 7px;
        padding-left:14px;
        padding-right: 14px;font-size: medium;
        background-color:#bacdb0ff;
        -webkit-text-fill-color:#866546ff  ;">Add</a>
        </div>
        <div class="delete">
        <a href="{{ url_for('deleat') }}" class="btn" style="padding-top: 7px;
        padding-bottom: 7px;
        padding-left:14px;
        padding-right:14px;
        font-size: medium;background-color:#bacdb0ff;
        -webkit-text-fill-color:#866546ff  ;">Delete</a>
        </div>
        <div class="logout">
        <a href="{{ url_for('logout') }}" class="btn" style="padding-top: 7px;
        padding-bottom: 7px;
        padding-left:14px;
        padding-right: 14px;font-size: medium;
        background-color:#bacdb0ff;
        -webkit-text-fill-color:#866546ff  ;">Logout</a>
        </div>
    {% else %}
        <div class="logout">
        <a href="{{ url_for('landing') }}" class="btn" style="padding-top: 7px;
        padding-bottom: 7px;
        padding-left:14px;
        padding-right: 14px;
        font-size: medium;
        background-color:#bacdb0ff;
        -webkit-text-fill-color:#866546ff  ;">Landing</a>
        </div>

    {% endif %}
    
    

                            

            
        


     
     
     
     
     
     
     
     
     
          
        
    </body>
</html>
